name: Architecture Enforcer

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  architecture-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web deps (parser dependency source)
        working-directory: apps/web
        run: npm ci

      - name: Run Architecture Enforcer
        run: npm run architecture:check
