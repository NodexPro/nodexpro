name: DocFlow Daily Scheduler

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Call DocFlow scheduler
        run: |
          curl -X POST https://nodexpro.onrender.com/api/v1/docflow/internal/scheduler/run-daily \
            -H "X-Internal-Cron-Secret: ${{ secrets.INTERNAL_CRON_SECRET }}"
